<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematik Sinav Calismasi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="app">
        <div id="homeView" class="view active">
            <header class="hero">
                <h1>12. Sinif Matematik</h1>
                <p class="subtitle">2. Donem - 1. Yazili Calisma Kagidi</p>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div id="progressBar" class="progress-fill"></div>
                    </div>
                    <span id="progressText" class="progress-text">0 / 8 soru cozuldu</span>
                </div>
            </header>

            <div class="topics">
                <span class="topic-badge">Sureklilik</span>
                <span class="topic-badge">Turev Kavrami</span>
                <span class="topic-badge">Turevlenebilirlik</span>
                <span class="topic-badge">Turev Kurallari</span>
                <span class="topic-badge">Artan/Azalan</span>
                <span class="topic-badge">Maks/Min</span>
            </div>

            <div id="questionList" class="question-list"></div>
        </div>

        <div id="questionView" class="view">
            <div class="question-nav-top">
                <button id="btnBack" class="btn-back">&#8592; Sorular</button>
                <span id="questionCounter" class="counter">1/8</span>
            </div>

            <div id="questionCard" class="question-card"></div>

            <div class="question-nav-bottom">
                <button id="btnPrev" class="btn-nav">&#8592; Onceki</button>
                <button id="btnCheck" class="btn-check">Cozumu Gor</button>
                <button id="btnNext" class="btn-nav">Sonraki &#8594;</button>
            </div>
        </div>
    </div>

    <script src="./questions.js"></script>
    <script src="./app.js"></script>
</body>
</html>
